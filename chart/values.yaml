replicaCount: 1

image:
  repository: harbor.i2cv.io/cosmichorizon/indopacom-merge
  pullPolicy: Always
  tag: ""

imagePullSecrets:
  - name: s-hxl2n
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  portWeb: 8000

resources:
  requests:
    cpu: "2"
    memory: "4Gi"
  limits:
    cpu: "4"
    memory: "8Gi"

ingress:
  enabled: false
  className: "cosmichorizon-nginx"
  annotations:
    argocd.argoproj.io/tracking-id: indopacom-merge:networking.k8s.io/Ingress:cosmichorizon/indopacom-merge
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/configuration-snippet: |
      rewrite ^(/indopacom-merge)$ $1/ permanent;
    external-dns.alpha.kubernetes.io/target: test-cosmichorizon-worker-68a3110f01feebd0.elb.us-gov-west-1.amazonaws.com

  hosts:
    - host: test-cosmichorizon-worker-68a3110f01feebd0.elb.us-gov-west-1.amazonaws.com
      paths:
        - path: /indopacom-merge(/|$)(.*)
          pathType: ImplementationSpecific
          backendPort: 8000
  tls: []

chatkeySecretName: "indopacom-merge-secrets"
certsSecretName: "indopacom-merge-certs"

env: []
